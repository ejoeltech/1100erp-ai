<div class="id-card-canvas" style="background-color: {{bg_color_back}}; position: relative; overflow: hidden; box-sizing: border-box;">
    <!-- Background Waves -->
    <div class="comp-waves" style="position: absolute; bottom: 0; left: 0; width: 100%; height: {{wave_height_back}}px; opacity: {{wave_opacity_back}}; z-index: 1;">
        <svg viewBox="0 0 350 150" preserveAspectRatio="none" style="width: 100%; height: 100%; transform: scaleY(-1);">
            <path d="M0,50 C100,30 200,80 350,40 L350,150 L0,150 Z" fill="{{color_secondary}}" opacity="0.8" />
            <path d="M0,70 C120,50 250,100 350,70 L350,150 L0,150 Z" fill="{{color_primary}}" opacity="0.9" />
        </svg>
    </div>

    <!-- Certification Header -->
    <div style="position: absolute; left: {{btitle_x}}px; top: {{btitle_y}}px; width: {{btitle_w}}px; text-align: center; z-index: 2;">
        <h3 style="font-size: {{btitle_size}}px; font-weight: 900; color: var(--primary-color); letter-spacing: 1.5px; text-transform: uppercase;">
            {{back_title}}
        </h3>
    </div>

    <!-- Body Text -->
    <div style="position: absolute; left: {{btext_x}}px; top: {{btext_y}}px; width: {{btext_w}}px; text-align: center; padding: 0 10px; box-sizing: border-box; z-index: 2;">
        <p style="font-size: 9.5px; line-height: 1.5; color: #444; font-weight: 500; white-space: pre-line;">
            {{back_content}}
        </p>
    </div>

    <!-- Official Signature Block -->
    <div style="position: absolute; left: {{sig_x}}px; top: {{sig_y}}px; width: {{sig_w}}px; font-size: 9px; color: #666; font-weight: 600; display: flex; flex-direction: column; gap: 10px; z-index: 2;">
        <div style="display: flex; gap: 5px;">
            <span>Issued by:</span>
            <span style="flex: 1; border-bottom: 1px solid #ccc;"></span>
        </div>
        <div style="display: flex; gap: 5px;">
            <span>Authorized Signature:</span>
            <span style="flex: 1; border-bottom: 1px solid #ccc; position: relative;">
                <span style="position: absolute; top: -15px; left: 10px; font-family: cursive; font-size: 14px; color: #222;">{{signature}}</span>
            </span>
        </div>
        <div style="display: flex; gap: 5px;">
            <span>Date Issued:</span>
            <span style="flex: 1; border-bottom: 1px solid #ccc;"></span>
        </div>
    </div>

    <!-- Contact Row -->
    <div style="position: absolute; left: {{addr_x}}px; top: {{addr_y}}px; width: {{addr_w}}px; text-align: left; z-index: 2;">
        <div style="font-size: 8.5px; line-height: 1.4; color: #333; font-weight: 700; white-space: pre-line;">
            {{business_address}}
        </div>
    </div>

    <!-- QR Code -->
    <div class="comp-qr-back" style="position: absolute; left: {{qr_x_back}}px; top: {{qr_y_back}}px; width: {{qr_size_back}}px; height: {{qr_size_back}}px; background: white; padding: 4px; border: 1px solid #eee; border-radius: 4px; z-index: 2; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        {{qr_placeholder_back}}
    </div>
</div>
</div>
</div>
