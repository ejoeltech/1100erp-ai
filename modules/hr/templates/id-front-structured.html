<div class="id-card-canvas" style="--primary-color: {{color_primary}}; --secondary-color: {{color_secondary}};">
    <div class="zone zone-header {{header_layout}}">
        <div class="logo-container" style="width: {{logo_width}}px; height: {{logo_height}}px;">
            <div class="comp-logo">{{company_logo}}</div>
        </div>
        <div class="text-container">
            <div class="brand-name" style="font-size: {{logo_text_size}}px; color: {{logo_text_color}};">{{company_name}}</div>
            <div class="brand-subtitle" style="font-size: {{subtitle_size}}px;">{{subtitle}}</div>
        </div>
    </div>
    
    <div class="zone zone-photo">
        <div class="comp-photo-frame" style="border-radius: {{photo_radius}}%; border: {{photo_border_width}}px solid {{photo_border_color}};">
            <img src="{{photo_url}}" alt="Photo">
        </div>
    </div>
    
    <div class="zone zone-identity">
        <div class="comp-name" style="font-size: {{name_size}}px;">{{full_name}}</div>
        <div class="comp-role" style="font-size: {{role_size}}px;">{{designation}}</div>
    </div>
    
    <div class="zone zone-contact">
        <div class="comp-contact-row">
            <div class="comp-icon-box"><i class="fa-regular fa-id-card"></i></div>
            <div class="comp-contact-text">ID: {{employee_code}}</div>
        </div>
        <div class="comp-contact-row">
            <div class="comp-icon-box"><i class="fa-solid fa-phone"></i></div>
            <div class="comp-contact-text">{{phone}}</div>
        </div>
        <div class="comp-contact-row">
            <div class="comp-icon-box" style="background: var(--primary-color);"><i class="fa-regular fa-envelope"></i></div>
            <div class="comp-contact-text">{{email}}</div>
        </div>
    </div>

    <div class="comp-qr-box" style="display: {{show_qr}};">
        {{qr_code}}
    </div>

    <div class="zone zone-footer">
        <div class="comp-waves">
            <svg viewBox="0 0 350 150" preserveAspectRatio="none" style="width: 100%; height: 100%;">
                <path d="M0,50 C100,30 200,80 350,40 L350,150 L0,150 Z" fill="{{color_secondary}}" opacity="0.8" />
                <path d="M0,70 C120,50 250,100 350,70 L350,150 L0,150 Z" fill="{{color_primary}}" opacity="0.9" />
            </svg>
        </div>
    </div>
</div>
